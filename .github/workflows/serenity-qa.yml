name: Serenity BDD CI

on:
  push:
    branches:
      - qa
  pull_request:
    branches:
      - qa
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Checkout del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar JDK 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. Instalar Chrome estable
      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      # 4. Instalar ChromeDriver compatible
      - name: Instalar ChromeDriver compatible
        run: |
          sudo apt-get install -y xvfb

          CHROME_VERSION=$("${{ steps.setup-chrome.outputs.chrome-path }}" --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version detectada: $CHROME_VERSION"

          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          echo "Descargando ChromeDriver desde: $CHROMEDRIVER_URL"

          wget -q "$CHROMEDRIVER_URL" -O chromedriver.zip
          unzip -q chromedriver.zip
          chmod +x chromedriver-linux64/chromedriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver

          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=/usr/local/bin/chromedriver" >> $GITHUB_ENV

      # 5. Verificar versiones
      - name: Verificar Chrome y ChromeDriver
        run: |
          echo "Chrome: $($CHROME_BIN --version)"
          echo "ChromeDriver: $($CHROMEDRIVER_BIN --version)"

      # 6. Ejecutar pruebas Serenity
      - name: Ejecutar pruebas Serenity
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' \
          mvn clean verify \
            -Dwebdriver.driver=chrome \
            -Dwebdriver.chrome.driver="$CHROMEDRIVER_BIN" \
            -Dwebdriver.chrome.binary="$CHROME_BIN" \
            -Dchrome.switches="--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080" \
            -Dserenity.outputDirectory=target/site/serenity \
            -e

      # 6.1 Mostrar errores si hay fallos
      - name: Imprimir errores de failsafe
        if: failure()
        run: |
          echo "===== FAILSAFE REPORTS ====="
          find target/failsafe-reports -name "*.txt" 2>/dev/null | xargs -I {} sh -c 'echo "--- {} ---"; cat {}'

      # 6.2 Guardar failsafe reports
      - name: Guardar failsafe-reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
          if-no-files-found: warn

      # 7. Regenerar reporte Serenity
      - name: Regenerar reporte Serenity
        if: success() || failure()
        run: mvn serenity:aggregate

      # 8. Verificar contenido del reporte
      - name: Verificar contenido del reporte
        if: success() || failure()
        run: ls -l target/site/serenity

      # 9. Guardar reporte como artefacto
      - name: Guardar reporte Serenity como artefacto
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-serenity
          path: target/site/serenity
          if-no-files-found: warn

      # 10. Publicar en GitHub Pages
      - name: Publicar reporte en GitHub Pages
        if: success() || failure()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/serenity

      # 11. Mostrar link del reporte (PRO)
      - name: Mostrar link del reporte
        if: always()
        run: |
          echo "-----------------------------------"
          echo "SERENITY REPORT:"
          echo "https://jonathancastro-qa.github.io/DemoQAFormScreenplay/"
          echo "-----------------------------------"

      # 12. Job Summary en GitHub (PRO)
      - name: Crear resumen del Job
        if: always()
        run: |
          echo "## 🧪 Serenity Automation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repositorio: DemoQAFormScreenplay" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Reporte:" >> $GITHUB_STEP_SUMMARY
          echo "https://jonathancastro-qa.github.io/DemoQAFormScreenplay/" >> $GITHUB_STEP_SUMMARY

      # 13. Comentario automático en PR (PRO)
      - name: Comentar reporte en Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Automation Test Report

Serenity Report:
  https://jonathancastro-qa.github.io/DemoQAFormScreenplay/
  
  Pipeline ejecutado correctamente.`
  })